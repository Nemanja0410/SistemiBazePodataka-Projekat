<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izveštaji — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container pb-5">
        <div class="pt-4 pb-2">
            <h3 class="mb-0">📊 Izveštaji i statistike</h3>
        </div>

        <div id="greska" class="greska-box d-none"></div>

        <ul class="nav nav-tabs mb-3" id="tabIzvestaji">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabPolise" type="button">📋 Polise po tipu</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabStete" type="button">⚠️ Štete</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAgenti" type="button">👤 Agenti</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Polise po tipu -->
            <div class="tab-pane fade show active" id="tabPolise">
                <div class="d-flex justify-content-end mb-2">
                    <button class="btn btn-osig-plava btn-sm" id="btnExportPolise">💾 Izvezi CSV</button>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>Tip osiguranja</th><th>Broj polisa</th><th>Ukupna premija</th><th>Prosečna premija</th></tr></thead>
                            <tbody id="tbodyPolise"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Stete -->
            <div class="tab-pane fade" id="tabStete">
                <div class="d-flex justify-content-end mb-2">
                    <button class="btn btn-osig-plava btn-sm" id="btnExportStete">💾 Izvezi CSV (po statusu)</button>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header">Po vrsti štete</div>
                            <div class="card-body p-0">
                                <table class="table table-hover mb-0">
                                    <thead><tr><th>Vrsta štete</th><th>Broj</th><th>Ukupno</th></tr></thead>
                                    <tbody id="tbodyVrsta"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-header">Po statusu</div>
                            <div class="card-body p-0">
                                <table class="table table-hover mb-0">
                                    <thead><tr><th>Status</th><th>Broj</th><th>Ukupno</th><th>Prosek</th></tr></thead>
                                    <tbody id="tbodyStatus"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Agenti -->
            <div class="tab-pane fade" id="tabAgenti">
                <div class="d-flex justify-content-end mb-2">
                    <button class="btn btn-osig-plava btn-sm" id="btnExportAgenti">💾 Izvezi CSV</button>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>Agent</th><th>Tip</th><th>Region</th><th>Br. polisa</th><th>Provizija %</th></tr></thead>
                            <tbody id="tbodyAgenti"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script src="izvestaji.js"></script>
</body>
</html>
