<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center" style="min-height:100vh;">
    <div class="container" style="max-width:420px;">
        <div class="card shadow-sm">
            <div class="card-header text-center">🔒 Prijava u sistem</div>
            <div class="card-body p-4">
                <div id="greska" class="greska-box d-none"></div>
                <form id="formaPrijava">
                    <div class="mb-3">
                        <label class="form-label">Korisničko ime</label>
                        <input type="text" class="form-control" id="korisnickoIme" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lozinka</label>
                        <input type="password" class="form-control" id="lozinka" required>
                    </div>
                    <button type="submit" class="btn btn-osig w-100">Prijavi se</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="register.html">Nemate nalog? Registrujte se</a>
                </div>
            </div>
        </div>
        <p class="text-center text-muted mt-3" style="font-size:.8rem;">
            API mora biti pokrenut na <code>http://localhost:5080</code>
        </p>
    </div>

    <script src="api.js"></script>
    <script src="login.js"></script>
</body>
</html>
