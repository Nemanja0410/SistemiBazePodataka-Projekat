<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nalozi — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container pb-5">
        <div class="pt-4 pb-2 d-flex justify-content-between align-items-center">
            <h3 class="mb-0">🔑 Upravljanje nalozima</h3>
        </div>

        <div id="greska" class="greska-box d-none"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header">Nalozi na čekanju</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Korisničko ime</th>
                            <th>Zaposleni</th>
                            <th>Tip osoblja</th>
                            <th>Registrovan</th>
                            <th style="width:280px;">Dodeli ulogu</th>
                            <th style="width:170px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbodyNaCekanju"></tbody>
                </table>
                <div class="p-3 text-muted" id="prazNaCekanju" style="display:none;">Nema naloga na čekanju.</div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">Svi nalozi</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Korisničko ime</th>
                            <th>Zaposleni</th>
                            <th>Uloga</th>
                            <th>Status</th>
                            <th>Neuspešnih prijava</th>
                            <th>Zadnja prijava</th>
                            <th style="width:220px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbodySvi"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nalozi.js"></script>
</body>
</html>
