<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osoblje — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid pb-5 px-4">
        <div class="pt-4 pb-2">
            <h3 class="mb-0">🧑‍💼 Osoblje</h3>
        </div>

        <div id="greska" class="greska-box d-none"></div>

        <div class="d-flex gap-2 mb-3 align-items-center flex-wrap">
            <select id="filterTip" class="form-select" style="max-width:200px;">
                <option value="SVE">Svi tipovi</option>
                <option value="AGENT">Agent</option>
                <option value="PROCENITELJ">Procenitelj</option>
                <option value="LEKAR">Lekar</option>
                <option value="PRAVNIK">Pravnik</option>
            </select>
            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown" id="dropDodaj">
                    <button class="btn btn-osig dropdown-toggle" data-bs-toggle="dropdown">➕ Dodaj</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#modalAgent">Agenta</a></li>
                        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#modalOstalo">Procenitelja / lekara / pravnika</a></li>
                    </ul>
                </div>
                <button class="btn btn-outline-secondary" id="btnOsvezi">⟳ Osveži</button>
                <span class="text-muted" id="lblBroj">Ukupno: 0</span>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="prezime">Ime i prezime</th>
                            <th class="sortable" data-sort="tipOsoblja">Tip</th>
                            <th class="sortable" data-sort="telefon">Telefon</th>
                            <th class="sortable" data-sort="email">Email</th>
                            <th>Dodatno</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable" data-sort="datumAngazovanja">Angažovan</th>
                            <th style="width:150px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbodyOsoblje"></tbody>
                </table>
            </div>
        </div>
        <p class="text-muted mt-2" style="font-size:.82rem;">Klikni na red za detalje, ili na zaglavlje kolone za sortiranje.</p>
    </div>

    <!-- Modal: dodaj agenta -->
    <div class="modal fade" id="modalAgent" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formaAgent">
                    <div class="modal-header"><h5 class="modal-title">Dodaj agenta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div id="greskaAgent" class="greska-box d-none"></div>
                        <div class="mb-2"><label class="form-label">Ime *</label><input class="form-control" id="aIme" required></div>
                        <div class="mb-2"><label class="form-label">Prezime *</label><input class="form-control" id="aPrezime" required></div>
                        <div class="mb-2"><label class="form-label">JMBG * (13 cifara)</label><input class="form-control" id="aJmbg" maxlength="13" required></div>
                        <div class="mb-2"><label class="form-label">Adresa</label><input class="form-control" id="aAdresa"></div>
                        <div class="mb-2"><label class="form-label">Telefon</label><input class="form-control" id="aTelefon"></div>
                        <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="aEmail"></div>
                        <div class="mb-2"><label class="form-label">Tip agenta</label>
                            <select class="form-select" id="aTipAgenta"><option value="INTERNI">Interni</option><option value="EKSTERNI">Eksterni</option></select>
                        </div>
                        <div class="mb-2"><label class="form-label">Licenca *</label><input class="form-control" id="aLicenca" required></div>
                        <div class="mb-2"><label class="form-label">Region rada</label><input class="form-control" id="aRegion"></div>
                        <div class="mb-2"><label class="form-label">Provizija %</label><input type="number" step="0.01" class="form-control" id="aProvizija"></div>
                        <div class="mb-2"><label class="form-label">Status</label>
                            <select class="form-select" id="aStatus"><option value="AKTIVAN">Aktivan</option><option value="NEAKTIVAN">Neaktivan</option><option value="SUSPENDOVAN">Suspendovan</option></select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                        <button type="submit" class="btn btn-osig">Sačuvaj</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: dodaj ostalo (procenitelj/lekar/pravnik/ostalo) -->
    <div class="modal fade" id="modalOstalo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formaOstalo">
                    <div class="modal-header"><h5 class="modal-title">Dodaj zaposlenog</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div id="greskaOstalo" class="greska-box d-none"></div>
                        <div class="mb-2"><label class="form-label">Tip *</label>
                            <select class="form-select" id="oTip">
                                <option value="PROCENITELJ">Procenitelj</option>
                                <option value="LEKAR">Lekar</option>
                                <option value="PRAVNIK">Pravnik</option>
                                <option value="OSTALO">Ostalo</option>
                            </select>
                        </div>
                        <div class="mb-2"><label class="form-label">Ime *</label><input class="form-control" id="oIme" required></div>
                        <div class="mb-2"><label class="form-label">Prezime *</label><input class="form-control" id="oPrezime" required></div>
                        <div class="mb-2"><label class="form-label">JMBG * (13 cifara)</label><input class="form-control" id="oJmbg" maxlength="13" required></div>
                        <div class="mb-2"><label class="form-label">Adresa</label><input class="form-control" id="oAdresa"></div>
                        <div class="mb-2"><label class="form-label">Telefon</label><input class="form-control" id="oTelefon"></div>
                        <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="oEmail"></div>
                        <div class="mb-2"><label class="form-label">Status</label>
                            <select class="form-select" id="oStatus"><option value="AKTIVAN">Aktivan</option><option value="NEAKTIVAN">Neaktivan</option><option value="SUSPENDOVAN">Suspendovan</option></select>
                        </div>
                        <div class="mb-2 d-none" id="oRedPravnik1"><label class="form-label">Tip pravnika *</label>
                            <select class="form-select" id="oTipPravnika"><option value="INTERNI">Interni</option><option value="EKSTERNI">Eksterni</option></select>
                        </div>
                        <div class="mb-2 d-none" id="oRedPravnik2"><label class="form-label">Broj advokata</label><input class="form-control" id="oBarBroj"></div>
                        <div class="mb-2 d-none" id="oRedProcenitelj"><label class="form-label">Broj licence</label><input class="form-control" id="oBrojLicence"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                        <button type="submit" class="btn btn-osig">Sačuvaj</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: izmeni (samo zajednicka polja, isto kao WinForms IzmeniOsobljeForma) -->
    <div class="modal fade" id="modalIzmeni" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formaIzmeni">
                    <div class="modal-header"><h5 class="modal-title" id="izmeniNaslov">Izmeni zaposlenog</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div id="greskaIzmeni" class="greska-box d-none"></div>
                        <input type="hidden" id="ezId">
                        <div class="mb-2"><label class="form-label">Ime *</label><input class="form-control" id="ezIme" required></div>
                        <div class="mb-2"><label class="form-label">Prezime *</label><input class="form-control" id="ezPrezime" required></div>
                        <div class="mb-2"><label class="form-label">Adresa</label><input class="form-control" id="ezAdresa"></div>
                        <div class="mb-2"><label class="form-label">Telefon</label><input class="form-control" id="ezTelefon"></div>
                        <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="ezEmail"></div>
                        <div class="mb-2"><label class="form-label">Status</label>
                            <select class="form-select" id="ezStatus"><option value="AKTIVAN">Aktivan</option><option value="NEAKTIVAN">Neaktivan</option><option value="SUSPENDOVAN">Suspendovan</option></select>
                        </div>
                        <div class="mb-2 d-none" id="ezRedPravnik1"><label class="form-label">Tip pravnika</label>
                            <select class="form-select" id="ezTipPravnika"><option value="INTERNI">Interni</option><option value="EKSTERNI">Eksterni</option></select>
                        </div>
                        <div class="mb-2 d-none" id="ezRedPravnik2"><label class="form-label">Broj advokata</label><input class="form-control" id="ezBarBroj"></div>
                        <div class="mb-2 d-none" id="ezRedProcenitelj"><label class="form-label">Broj licence</label><input class="form-control" id="ezBrojLicence"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                        <button type="submit" class="btn btn-osig">Sačuvaj</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Offcanvas: detalji zaposlenog -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offDetalji" style="width:400px;">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="detaljiNaziv">Detalji zaposlenog</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div class="d-flex gap-2 mb-3 pb-3 border-bottom" id="detaljiAkcije">
                <button class="btn btn-osig-plava flex-fill" id="btnDetaljiIzmeni">✏️ Izmeni</button>
                <button class="btn btn-osig-narandzasta flex-fill d-none" id="btnDetaljiOblasti">🗺️ Oblasti procene</button>
                <button class="btn btn-osig-crvena flex-fill" id="btnDetaljiObrisi">🗑️ Obriši</button>
            </div>
            <div id="detaljiSadrzaj" class="flex-grow-1"><p class="text-muted">Učitavanje...</p></div>
        </div>
    </div>

    <!-- Modal: oblasti procene (samo za Procenitelja) -->
    <div class="modal fade" id="modalOblasti" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="oblastiNaslov">Oblasti procene</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div id="greskaOblasti" class="greska-box d-none"></div>
                    <ul class="list-group mb-3" id="listaOblasti"></ul>
                    <form id="formaOblasti" class="d-flex gap-2">
                        <select class="form-select" id="novaOblast"></select>
                        <button type="submit" class="btn btn-osig text-nowrap">➕ Dodaj</button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zatvori</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script src="osoblje.js"></script>
</body>
</html>
