<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registracija — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center" style="min-height:100vh;">
    <div class="container" style="max-width:460px;">
        <div class="card shadow-sm">
            <div class="card-header text-center">📝 Registracija naloga</div>
            <div class="card-body p-4">
                <div id="greska" class="greska-box d-none"></div>
                <div id="poruka" class="alert alert-success d-none"></div>
                <form id="formaRegistracija">
                    <div class="mb-3">
                        <label class="form-label">Zaposleni</label>
                        <select class="form-select" id="osobljeId" required></select>
                        <div class="form-text">Lista prikazuje samo zaposlene koji još nemaju nalog.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Korisničko ime</label>
                        <input type="text" class="form-control" id="korisnickoIme" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lozinka</label>
                        <input type="password" class="form-control" id="lozinka" required>
                        <div class="form-text">Bar 8 karaktera i bar jedna cifra.</div>
                    </div>
                    <button type="submit" class="btn btn-osig w-100">Pošalji zahtev</button>
                </form>
                <hr>
                <div class="text-center">
                    <a href="login.html">Nazad na prijavu</a>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="register.js"></script>
</body>
</html>
