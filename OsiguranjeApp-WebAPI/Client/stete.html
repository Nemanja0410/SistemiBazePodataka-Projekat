<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Štete — OsiguranjApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid pb-5 px-4">
        <div class="pt-4 pb-2">
            <h3 class="mb-0">⚠️ Štete</h3>
        </div>

        <div id="greska" class="greska-box d-none"></div>

        <div class="d-flex gap-2 mb-3 align-items-center flex-wrap">
            <select id="filterStatus" class="form-select" style="max-width:220px;">
                <option value="">Svi statusi</option>
                <option value="PRIJAVLJENA">Prijavljena</option>
                <option value="U_OBRADI">U obradi</option>
                <option value="U_PROCENI">U proceni</option>
                <option value="ODOBRENA">Odobrena</option>
                <option value="ODBIJENA">Odbijena</option>
                <option value="ISPLACENA">Isplaćena</option>
                <option value="ZATVORENA">Zatvorena</option>
            </select>
            <div class="ms-auto d-flex align-items-center gap-2">
                <button class="btn btn-osig" data-bs-toggle="modal" data-bs-target="#modalSteta">➕ Prijavi štetu</button>
                <button class="btn btn-outline-secondary" id="btnOsvezi">⟳ Osveži</button>
                <span class="text-muted" id="lblBroj">Ukupno: 0</span>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="brojStete">Broj</th>
                            <th class="sortable" data-sort="vrstaStete">Vrsta</th>
                            <th class="sortable" data-sort="podnosilacNaziv">Podnosilac</th>
                            <th class="sortable" data-sort="brojPolise">Polisa</th>
                            <th class="sortable" data-sort="procenjeniIznos">Iznos</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable" data-sort="datumPrijave">Prijavljena</th>
                            <th style="width:150px;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbodyStete"></tbody>
                </table>
            </div>
        </div>
        <p class="text-muted mt-2" style="font-size:.82rem;">Klikni na red za detalje, ili na zaglavlje kolone za sortiranje.</p>
    </div>

    <!-- Modal: prijava stete -->
    <div class="modal fade" id="modalSteta" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formaSteta">
                    <div class="modal-header"><h5 class="modal-title">Prijava štete</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div id="greskaSteta" class="greska-box d-none"></div>
                        <div class="mb-2"><label class="form-label">Vrsta štete *</label>
                            <select class="form-select" id="vrstaStete" required>
                                <option value="AUTO">Auto</option>
                                <option value="ZDRAVSTVENA">Zdravstvena</option>
                                <option value="IMOVINSKA">Imovinska</option>
                                <option value="PUTNA">Putna</option>
                                <option value="ZIVOTNA">Životna</option>
                                <option value="OSTALO">Ostalo</option>
                            </select>
                        </div>
                        <div class="mb-2"><label class="form-label">Broj štete *</label><input class="form-control" id="brojStete" required></div>
                        <div class="mb-2"><label class="form-label">Podnosilac *</label><select class="form-select" id="podnosilacId" required></select></div>
                        <div class="mb-2"><label class="form-label">Polisa *</label><select class="form-select" id="polisaId" required></select></div>
                        <div class="mb-2"><label class="form-label">Datum nastanka *</label><input type="date" class="form-control" id="datumNastanka" required></div>
                        <div class="mb-2"><label class="form-label">Lokacija</label><input class="form-control" id="lokacija"></div>
                        <div class="mb-2"><label class="form-label">Opis događaja</label><textarea class="form-control" id="opisDogodjaja" rows="2"></textarea></div>
                        <div class="mb-2"><label class="form-label">Procenjeni iznos</label><input type="number" step="0.01" class="form-control" id="procenjeniIznos"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                        <button type="submit" class="btn btn-osig">Sačuvaj</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: izmeni stetu (isto kao WinForms IzmeniSteteForma) -->
    <div class="modal fade" id="modalIzmeni" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formaIzmeni">
                    <div class="modal-header"><h5 class="modal-title" id="izmeniNaslov">Izmeni štetu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div id="greskaIzmeni" class="greska-box d-none"></div>
                        <input type="hidden" id="ezId">
                        <div class="mb-2"><label class="form-label">Datum nastanka *</label><input type="date" class="form-control" id="ezDatumNastanka" required></div>
                        <div class="mb-2"><label class="form-label">Lokacija</label><input class="form-control" id="ezLokacija"></div>
                        <div class="mb-2"><label class="form-label">Opis događaja</label><textarea class="form-control" id="ezOpisDogodjaja" rows="2"></textarea></div>
                        <div class="mb-2"><label class="form-label">Procenjeni iznos</label><input type="number" step="0.01" class="form-control" id="ezProcenjeniIznos"></div>
                        <div class="mb-2"><label class="form-label">Status</label>
                            <select class="form-select" id="ezStatus">
                                <option value="PRIJAVLJENA">Prijavljena</option>
                                <option value="U_OBRADI">U obradi</option>
                                <option value="U_PROCENI">U proceni</option>
                                <option value="ODOBRENA">Odobrena</option>
                                <option value="ODBIJENA">Odbijena</option>
                                <option value="ISPLACENA">Isplaćena</option>
                                <option value="ZATVORENA">Zatvorena</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
                        <button type="submit" class="btn btn-osig">Sačuvaj</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Offcanvas: detalji stete + akcije -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offDetalji" style="width:400px;">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="detaljiNaziv">Detalji štete</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div class="d-flex gap-2 mb-3 pb-3 border-bottom">
                <button class="btn btn-osig-plava flex-fill" id="btnDetaljiIzmeni">✏️ Izmeni</button>
                <button class="btn btn-osig-crvena flex-fill" id="btnDetaljiObrisi">🗑️ Obriši</button>
            </div>
            <div id="detaljiSadrzaj" class="flex-grow-1"><p class="text-muted">Učitavanje...</p></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script src="stete.js"></script>
</body>
</html>
